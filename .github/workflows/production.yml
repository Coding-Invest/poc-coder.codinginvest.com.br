name: Deploy Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}     

      - name: Login ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and Push Server
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/server:${{ env.VERSION }} -f ./Server/Dockerfile.prod .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/server:${{ env.VERSION }} \
                     ${{ secrets.ACR_LOGIN_SERVER }}/server:latest
          docker push --all-tags ${{ secrets.ACR_LOGIN_SERVER }}/server
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.2.0

      - name: Install Angular dependencies
        working-directory: Web
        run: npm ci

      - name: Build Angular (Production)
        working-directory: Web
        run: npm run build -- --configuration production

      - name: Build and Push Client
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/client:${{ env.VERSION }} -f ./Client/Dockerfile.prod .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/client:${{ env.VERSION }} \
                     ${{ secrets.ACR_LOGIN_SERVER }}/client:latest
          docker push --all-tags ${{ secrets.ACR_LOGIN_SERVER }}/client

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: 1.12.2

      - name: Terraform Init
        working-directory: Infrastructure
        run: terraform init

      - name: Terraform Apply (Production)
        working-directory: Infrastructure
        run: |
          terraform apply -auto-approve \
            -var="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="subscription_id=${{secrets.AZURE_SUBSCRIPTION_ID}}" \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="client_image=${{ secrets.ACR_LOGIN_SERVER }}/client:${{ env.VERSION }}" \
            -var="server_image=${{ secrets.ACR_LOGIN_SERVER }}/server:${{ env.VERSION }}" \
            -var="custom_domain_enabled=true"
